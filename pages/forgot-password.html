<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recuperar Senha | FORA DO RADAR</title>
    <meta name="description" content="Recupera o acesso à tua conta.">

    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="/css/auth.css">
</head>
<body>
    <header class="main-header">
        <div class="header-container">
            <a href="/index.html" class="logo">
                <span class="logo-icon">⚽</span>
                <span class="logo-text">FORA DO RADAR</span>
            </a>

            <button id="menu-toggle" class="menu-toggle" aria-label="Abrir menu">
                <span>☰</span>
            </button>

            <nav id="nav-links" class="nav-links">
                <a href="/index.html" class="nav-link">Início</a>
                <a href="/pages/paises.html" class="nav-link">Países</a>
            </nav>

            <div class="auth-container">
                <button class="auth-btn">
                    <span class="auth-btn-icon">👤</span>
                    <span>Entrar</span>
                </button>
                <div class="auth-dropdown">
                    <a href="/pages/login.html" class="auth-dropdown-item">
                        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"></path>
                            <polyline points="10 17 15 12 10 7"></polyline>
                            <line x1="15" y1="12" x2="3" y2="12"></line>
                        </svg>
                        Iniciar Sessão
                    </a>
                    <div class="auth-dropdown-divider"></div>
                    <a href="/pages/register.html" class="auth-dropdown-item">
                        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path>
                            <circle cx="8.5" cy="7" r="4"></circle>
                            <line x1="20" y1="8" x2="20" y2="14"></line>
                            <line x1="23" y1="11" x2="17" y2="11"></line>
                        </svg>
                        Criar Conta
                    </a>
                </div>
            </div>
        </div>
    </header>

    <main class="main-content auth-page">
        <div class="auth-container">
            <div class="auth-card">
                <div class="auth-header">
                    <span class="auth-icon">🔑</span>
                    <h1 class="auth-title">Recuperar Senha</h1>
                    <p class="auth-subtitle">Enviaremos um link para redefinir sua senha</p>
                </div>

                <form id="reset-password-form" class="auth-form">
                    <div class="form-group">
                        <label for="email">Email</label>
                        <input type="email" id="email" name="email" placeholder="seu@email.com" required autocomplete="email">
                    </div>

                    <div class="auth-error" style="display: none;"></div>
                    <div class="auth-success" style="display: none;"></div>

                    <button type="submit" class="btn-submit">
                        <span>Enviar Email</span>
                        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path>
                            <polyline points="22,6 12,13 2,6"></polyline>
                        </svg>
                    </button>
                </form>

                <div class="auth-links">
                    <a href="/pages/login.html">← Voltar ao Login</a>
                </div>
            </div>
        </div>
    </main>

    <footer class="main-footer">
        <div class="footer-container">
            <div class="footer-info">
                <p class="footer-logo">
                    <span class="logo-icon">⚽</span>
                    FORA DO RADAR
                </p>
                <p class="footer-tagline">Descubre clubes que o mundo ainda não conhece</p>
            </div>
            <div class="footer-credits">
                <p>&copy; 2024 FORA DO RADAR. Todos os direitos reservados.</p>
            </div>
        </div>
    </footer>

    <div class="notification"></div>

    <script type="module" src="/js/main.js"></script>
    <script type="module" src="/js/auth.js"></script>
</body>
</html>
